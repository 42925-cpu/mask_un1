<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชิกกี้ AI - Teachable Machine</title>
    <!-- นำเข้า Tailwind CSS สำหรับจัดแต่งความน่ารัก -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- นำเข้า Google Fonts สไตล์มนๆ สุดคิ้วท์ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Mitr', sans-serif;
        }
    </style>
</head>
<body class="bg-[#FFF0F5] text-slate-700 min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- การ์ดหลักดีไซน์โค้งมน นุ่มฟู -->
    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-[0_16px_32px_rgba(255,182,193,0.4)] border-4 border-[#FFD1DC] overflow-hidden">
        
        <!-- Header โดนใจสายหวาน -->
        <div class="p-6 bg-gradient-to-r from-[#FFC0CB] via-[#FFD1DC] to-[#E8F0FE] flex flex-col sm:flex-row justify-between items-center gap-4 border-b-4 border-[#FFD1DC]">
            <div class="text-center sm:text-left">
                <h1 class="text-2xl font-bold tracking-wide text-[#FF69B4] flex items-center justify-center sm:justify-start gap-2">
                    <span>🌸 Teachable Machine Image Model 🌸</span>
                </h1>
                <p class="text-[#DB7093] text-sm mt-1 font-medium">น้อง AI จะสแกนกล้องและรายงานผลทุกๆ 3 วินาทีนะฮะป๋ม 🎀</p>
            </div>
            <button type="button" id="start-btn" onclick="init()" class="cursor-pointer bg-[#FF69B4] hover:bg-[#FF1493] text-white font-bold px-8 py-3 rounded-2xl shadow-[0_4px_12px_rgba(255,105,180,0.4)] active:scale-95 transition-all duration-200 flex items-center gap-2 border-b-4 border-[#C71585]">
                <span>💖 Start !</span>
            </button>
        </div>

        <!-- Main Content -->
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 bg-[#FFFDFE]">
            
            <!-- Left: ช่องแสดงกล้องเว็บแคม -->
            <div class="flex flex-col items-center justify-center bg-[#E8F0FE] rounded-2xl p-6 border-2 border-dashed border-[#B0C4DE] min-h-[300px]">
                <div class="text-sm font-semibold text-[#4682B4] mb-3 flex items-center gap-2 bg-white px-4 py-1.5 rounded-full shadow-sm">
                    <span id="status-dot" class="w-3 h-3 rounded-full bg-slate-300 animate-ping"></span>
                    <span id="status-text">รอเปิดกล้องอยู่นะแก้มอ้วน 🛸</span>
                </div>
                
                <!-- กล่องเฟรมกล้อง -->
                <div id="webcam-container" class="relative rounded-2xl overflow-hidden border-4 border-white shadow-md bg-[#F0F8FF] aspect-video w-full flex items-center justify-center max-w-[340px]">
                    <div id="webcam-placeholder" class="text-[#B0C4DE] text-center p-6">
                        <span class="text-4xl block mb-2">🐰</span>
                        <p class="text-sm font-medium">กดปุ่มสีชมพูหวานแหวว<br>ด้านบนเพื่อเริ่มเลย!</p>
                    </div>
                </div>
            </div>

            <!-- Right: ช่องแสดงผลลัพธ์ของโมเดล -->
            <div class="flex flex-col justify-start bg-white rounded-2xl p-5 border-2 border-[#FFD1DC]">
                <h2 class="text-lg font-bold text-[#FF69B4] mb-4 flex items-center gap-2 border-b-2 border-dashed border-[#FFD1DC] pb-2">
                    <span>🍭 แท่นรายงานผลของน้อง AI</span>
                </h2>
                
                <!-- คอนเทนเนอร์แสดงความแม่นยำ -->
                <div id="label-container" class="space-y-4">
                    <div class="text-center py-8 text-[#DB7093] italic text-sm">
                        <span>ส่งยิ้มให้กล้อง แล้วรอผลแป๊บนึงน้า ✨</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts จากต้นฉบับ -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์ URL โมเดลตัวใหม่ที่คุณส่งมา
        const URL = "https://teachablemachine.withgoogle.com/models/jgMwAvjfo/";[cite: 2]
        let model, webcam, labelContainer, maxPredictions;

        async function init() {[cite: 2]
            document.getElementById("start-btn").disabled = true;
            document.getElementById("status-text").innerText = "กำลังปลุกน้อง AI... รอสักครู่ 🦄";
            
            const modelURL = URL + "model.json";[cite: 2]
            const metadataURL = URL + "metadata.json";[cite: 2]

            try {
                model = await tmImage.load(modelURL, metadataURL);[cite: 2]
                maxPredictions = model.getTotalClasses();[cite: 2]

                const flip = true;[cite: 2]
                webcam = new tmImage.Webcam(340, 255, flip);[cite: 2]
                await webcam.setup();[cite: 2]
                await webcam.play();[cite: 2]
                
                // วนลูปวิดีโอจากกล้องแบบ Realtime เพื่อไม่ให้ภาพกระตุกค้าง
                window.requestAnimationFrame(loop);[cite: 2]

                document.getElementById("webcam-placeholder").remove();
                document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
                
                // อัปเดตสถานะความกวน
                document.getElementById("status-dot").classList.remove("bg-slate-300");
                document.getElementById("status-dot").classList.add("bg-[#FF69B4]");
                document.getElementById("status-text").innerText = "สแกนภาพทุกๆ 3 วินาทีอยู่จ้า! ⚡";
                document.getElementById("start-btn").classList.add("hidden"); 

                // สร้างดีไซน์ Progress Bar แบบก้อนเมฆกลมมน
                labelContainer = document.getElementById("label-container");[cite: 2]
                labelContainer.innerHTML = ""; 
                for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                    const labelWrapper = document.createElement("div");
                    labelWrapper.className = "space-y-1.5 p-2 bg-[#FFF5F7] rounded-xl border border-[#FFE4E1]";
                    labelWrapper.innerHTML = `
                        <div class="flex justify-between text-sm font-bold">
                            <span class="text-[#DB7093] class-name">กำลังคำนวณ...</span>
                            <span class="text-[#FF69B4] class-percent">0%</span>
                        </div>
                        <div class="w-full bg-[#E6E6FA] rounded-full h-3.5 overflow-hidden p-[2px]">
                            <div class="bg-[#FFB6C1] h-2.5 rounded-full progress-bar transition-all duration-700" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(labelWrapper);[cite: 2]
                }

                // สั่งวิเคราะห์รอบแรกทันที
                predict();
                
                // ตั้งเวลาล็อกไว้ที่ 3 วินาที (3000ms) สำหรับการส่งไปประมวลผลที่โมเดล
                setInterval(predict, 3000);

            } catch (error) {
                console.error(error);
                alert("อุ๊ย! มีปัญหาในการเปิดกล้องหรือโหลดโมเดลจ้า");
                document.getElementById("start-btn").disabled = false;
                document.getElementById("status-text").innerText = "สถานะ: พังซะแล้ว 😿";
            }
        }

        async function loop() {[cite: 2]
            webcam.update(); // อัปเดตหน้ากล้องสตรีมสดอย่างต่อเนื่อง[cite: 2]
            window.requestAnimationFrame(loop);[cite: 2]
        }

        // ฟังก์ชันคำนวณวิเคราะห์ภาพที่จะทำงานทุกๆ 3 วินาที
        async function predict() {[cite: 2]
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);[cite: 2]
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                const className = prediction[i].className;[cite: 2]
                const probability = prediction[i].probability;[cite: 2]
                const percentage = (probability * 100).toFixed(0) + "%";
                
                const labelItems = labelContainer.childNodes[i];
                labelItems.querySelector(".class-name").innerText = "🧸 " + className;
                labelItems.querySelector(".class-percent").innerText = percentage;
                
                const progressBar = labelItems.querySelector(".progress-bar");
                progressBar.style.width = percentage;

                // เปลี่ยนสีพาสเทลตามระดับความมั่นใจของ AI 
                if (probability > 0.7) {
                    // มั่นใจสุดๆ: สีฟ้านมสดชื่น
                    progressBar.className = "bg-[#87CEFA] h-2.5 rounded-full progress-bar transition-all duration-700";
                } else if (probability > 0.3) {
                    // มั่นใจปานกลาง: สีชมพูนมเย็น
                    progressBar.className = "bg-[#FFB6C1] h-2.5 rounded-full progress-bar transition-all duration-700";
                } else {
                    // มั่นใจน้อย: สีเหลืองครีมพุดดิ้ง
                    progressBar.className = "bg-[#FFE4B5] h-2.5 rounded-full progress-bar transition-all duration-700";
                }
            }
        }
    </script>
</body>
</html>
