<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิ้วท์ AI - Teachable Machine</title>
    <!-- นำเข้า Tailwind CSS เพื่อจัดการ Layout และความคิ้วท์ -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- นำเข้า Google Fonts สไตล์น่ารัก นุ่มนวล -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Mitr', sans-serif;
        }
    </style>
</head>
<body class="bg-[#FFF9F2] text-slate-700 min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- การ์ดหลักดีไซน์โค้งมนสุดนุ่มนวล -->
    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-[0_16px_40px_rgba(237,203,176,0.3)] border-4 border-[#FFEBD8] overflow-hidden">
        
        <!-- Header โทนพาสเทลน่ารัก -->
        <div class="p-6 bg-gradient-to-r from-[#FFD1D1] via-[#FFE3E3] to-[#FFF5E4] flex flex-col sm:flex-row justify-between items-center gap-4 border-b-4 border-[#FFEBD8]">
            <div class="text-center sm:text-left">
                <h1 class="text-2xl font-bold tracking-wide text-[#FF7B7B] flex items-center justify-center sm:justify-start gap-2">
                    <span>✨ Teachable Machine AI ✨</span>
                </h1>
                <p class="text-[#A27B7B] text-sm mt-1 font-medium">น้อง AI จะช่วยสแกนภาพและอัปเดตผลทุกๆ 3 วินาทีนะเมี๊ยว~ 🐾</p>
            </div>
            <button type="button" id="start-btn" onclick="init()" class="cursor-pointer bg-[#FF8E8E] hover:bg-[#FF7B7B] text-white font-bold px-8 py-3 rounded-2xl shadow-[0_4px_12px_rgba(255,142,142,0.4)] active:scale-95 transition-all duration-200 flex items-center gap-2 border-b-4 border-[#D96868]">
                <span>📸 เปิดกล้องเลยยย</span>
            </button>
        </div>

        <!-- Main Content -->
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 bg-[#FFFBFA]">
            
            <!-- Left: กล่องเว็บแคมสุดคิ้วท์ -->
            <div class="flex flex-col items-center justify-center bg-[#FFF5E4] rounded-2xl p-6 border-2 border-dashed border-[#FFD1D1] min-h-[300px]">
                <div class="text-sm font-semibold text-[#BCA390] mb-3 flex items-center gap-2 bg-white px-4 py-1.5 rounded-full shadow-sm">
                    <span id="status-dot" class="w-3 h-3 rounded-full bg-slate-300 animate-ping"></span>
                    <span id="status-text">สถานะ: รอเปิดกล้องน้า ⏱️</span>
                </div>
                
                <!-- กล่องเฟรมกล้องดีไซน์มน -->
                <div id="webcam-container" class="relative rounded-2xl overflow-hidden border-4 border-white shadow-md bg-[#FAF4EE] aspect-video w-full flex items-center justify-center max-w-[340px]">
                    <div id="webcam-placeholder" class="text-[#CDAFA0] text-center p-6">
                        <span class="text-4xl block mb-2">🐱</span>
                        <p class="text-sm font-medium">กดปุ่มสีชมพูด้านบน<br>เพื่อเริ่มต้นใช้งานได้เลยจ้า</p>
                    </div>
                </div>
            </div>

            <!-- Right: ส่วนแสดงผลลัพธ์น่ารักๆ -->
            <div class="flex flex-col justify-start bg-white rounded-2xl p-5 border-2 border-[#FFEBD8]">
                <h2 class="text-lg font-bold text-[#FF8E8E] mb-4 flex items-center gap-2 border-b-2 border-dashed border-[#FFEBD8] pb-2">
                    <span>📊 ผลการวิเคราะห์ของน้อง AI</span>
                </h2>
                
                <!-- ผลลัพธ์แบบแถบสีพาสเทลดุ๊กดิ๊ก -->
                <div id="label-container" class="space-y-4">
                    <div class="text-center py-8 text-[#CDAFA0] italic text-sm">
                        <span>ตื่นเต้นจัง... รอผลลัพธ์จากกล้องอยู่นะจ๊ะ 🍭</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts จากต้นฉบับ -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/okghaBRXN/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            document.getElementById("start-btn").disabled = true;
            document.getElementById("status-text").innerText = "สถานะ: กำลังเรียกน้อง AI... 🧠✨";
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true; 
                webcam = new tmImage.Webcam(340, 255, flip); 
                await webcam.setup(); 
                await webcam.play();
                
                // วนลูปการแสดงผลวิดีโอจากกล้องแบบลื่นไหล
                window.requestAnimationFrame(loop);

                // ลบตัวอย่างออกและใส่กล้องตัวจริงเข้าไป
                document.getElementById("webcam-placeholder").remove();
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                // อัปเดตสถานะความน่ารัก
                document.getElementById("status-dot").classList.remove("bg-slate-300");
                document.getElementById("status-dot").classList.add("bg-[#7BE495]");
                document.getElementById("status-text").innerText = "สถานะ: จับตาดูอยู่ทุกๆ 3 วิ! 👀";
                document.getElementById("start-btn").classList.add("hidden"); 

                // สร้างดีไซน์ Progress Bar แบบกลมมนพาสเทล
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; 
                for (let i = 0; i < maxPredictions; i++) {
                    const labelWrapper = document.createElement("div");
                    labelWrapper.className = "space-y-1.5 p-2 bg-[#FFFBF7] rounded-xl border border-[#FFF0E0]";
                    labelWrapper.innerHTML = `
                        <div class="flex justify-between text-sm font-bold">
                            <span class="text-[#8E7568] class-name">กำลังประมวลผล...</span>
                            <span class="text-[#FF8E8E] class-percent">0%</span>
                        </div>
                        <div class="w-full bg-[#EFECE9] rounded-full h-3.5 overflow-hidden p-[2px]">
                            <div class="bg-[#FFB4B4] h-2.5 rounded-full progress-bar transition-all duration-700" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(labelWrapper);
                }

                // เรียกวิเคราะห์ทันทีรอบแรก
                predict();
                
                // ตั้งเวลาการวิเคราะห์ภาพ (predict) ทุกๆ 3 วินาที (3000 มิลลิวินาที) ตามความต้องการ
                setInterval(predict, 3000);

            } catch (error) {
                console.error(error);
                alert("อุ๊ย! เปิดกล้องไม่ได้ หรือโหลดโมเดลไม่สำเร็จจ้า");
                document.getElementById("start-btn").disabled = false;
                document.getElementById("status-text").innerText = "สถานะ: เกิดข้อผิดพลาด 😭";
            }
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมภาพต่อเนื่องเพื่อให้จอกล้องดูนุ่มนวลไม่ค้าง
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันวิเคราะห์ที่จะส่งไปให้โมเดลตรวจสอบทุกๆ 3 วินาที
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0) + "%";
                
                const labelItems = labelContainer.childNodes[i];
                labelItems.querySelector(".class-name").innerText = "🏷️ " + className;
                labelItems.querySelector(".class-percent").innerText = percentage;
                
                const progressBar = labelItems.querySelector(".progress-bar");
                progressBar.style.width = percentage;

                // เปลี่ยนโทนสีพาสเทลตามความมั่นใจของ AI 
                if (probability > 0.7) {
                    // มั่นใจมาก: สีเขียวมินต์พาสเทลสุดสดใส
                    progressBar.className = "bg-[#99E1D9] h-2.5 rounded-full progress-bar transition-all duration-700";
                } else if (probability > 0.3) {
                    // มั่นใจปานกลาง: สีส้มชานมพาสเทล
                    progressBar.className = "bg-[#FFCAD4] h-2.5 rounded-full progress-bar transition-all duration-700";
                } else {
                    // มั่นใจน้อยหรืออันดับรองๆ: สีม่วงลาเวนเดอร์อ่อนๆ
                    progressBar.className = "bg-[#D8B4F8] h-2.5 rounded-full progress-bar transition-all duration-700";
                }
            }
        }
    </script>
</body>
</html>
